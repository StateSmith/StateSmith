name: Release ss.cli on cli-v*.*.* tags

on:
  push:
    tags:
      - "cli-v[0-9]*.*.*"

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  codeql:
    uses: ./.github/workflows/codeql.yml
    
  build:
    needs: [test, codeql] # require these to pass first
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
          
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x

      - name: Extract SemVer from GITHUB_REF
        run: echo "semver=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_ENV

      - name: Print SemVer
        run: echo "Current tag ${{ env.semver }}"

      - name: Install dependencies
        run: dotnet restore src/StateSmith.sln

      - name: Build And Publish Nuget
        env:
          NUGET_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet pack src/StateSmith.Cli/StateSmith.Cli.csproj -c Release -p:Version=${{ env.semver }} --output ./nupkg
          dotnet nuget push ./nupkg/StateSmith.Cli.${{ env.semver }}.nupkg \
            --api-key "$NUGET_KEY" \
            --source https://api.nuget.org/v3/index.json

      - name: Ensure zip is installed
        run: sudo apt-get install -y zip

      # TODO - use github strategy matrix to parallelize builds
      - name: Build Binaries
        run: |
          staging="/tmp/staging"
          publish="/tmp/publish"
          mkdir -p $publish          
          for arch in linux-arm linux-arm64 linux-musl-arm64 linux-musl-x64 linux-x64 osx-arm64 osx-x64 win-arm64 win-x64 win-x86; do
            extension=""
            if [[ $arch == "win"* ]]; then
              extension=".exe"
            fi
            framework="net9.0"
            mkdir -p $staging
            ( 
              cd src/StateSmith.Cli 
              dotnet publish -c Release -p:Version=${{ env.semver }} -r $arch -p:PublishSingleFile=true --self-contained --framework $framework -p:EnableCompressionInSingleFile=true -p:DefineConstants="SS_SINGLE_FILE_APPLICATION"
              mv ./bin/Release/$framework/$arch/publish/StateSmith.Cli$extension $staging/ss.cli$extension
              rm -rf ./bin
            )
            (
              cd $staging
              if [[ $arch == "win"* ]]; then
                zip -9 $publish/statesmith-${arch}.zip ss.cli$extension
              else
                tar zcf $publish/statesmith-${arch}.tar.gz ss.cli$extension
              fi
            )
            rm -rf $staging
          done

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --generate-notes \
            --draft \
            /tmp/publish/*
