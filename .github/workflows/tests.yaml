name: Tests

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'src/test-misc/ts-spec2/package.json'

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x

      # Kotlin requires Java
      - name: Setup Java (for Kotlin tests)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Swift setup for Linux (MacOS has it pre-installed)
      - name: Setup Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.2'

      - name: Install dependencies
        run: dotnet restore src/StateSmith.sln

      - name: Build
        run: dotnet build --configuration Debug --no-restore src/StateSmith.sln

      - name: Test
        run: dotnet test --no-restore src/StateSmith.sln

      # Test Algorithm.Balanced1
      # Above `Test` step only tests default algorithm (Balanced2)
      # https://github.com/StateSmith/StateSmith/issues/526
      - name: Test Algorithm.Balanced1
        env:
          STATESMITH_TEST_ALGORITHM_ID: Balanced1

        # only the early supported languages support Balanced1 so we just test them to avoid expected unsupported failures for later languages.
        run: dotnet test src/StateSmithTest/ --filter 'DisplayName~Spec.Spec2.C.|DisplayName~Spec.Spec2.CSharp.|DisplayName~Spec.Spec2.JavaScript.'
