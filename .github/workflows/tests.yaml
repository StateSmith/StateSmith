name: Tests

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: 'src/test-misc/ts-spec2/package.json'

      # for Berry
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev
      
      # for Berry
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install readline

      - name: Clone Berry v1.1.0
        run: |
          git clone --depth 1 --branch v1.1.0 https://github.com/berry-lang/berry.git
          cd berry
          git checkout b5ede66721937533fbf5c286ef44a5111ea30c75

      - name: Build Berry
        run: |
          cd berry
          make

      - name: Add Berry to PATH
        run: |
          echo "$PWD/berry" >> $GITHUB_PATH

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x

      - name: Install dependencies
        run: dotnet restore src/StateSmith.sln

      - name: Build
        run: dotnet build --configuration Debug --no-restore src/StateSmith.sln

      - name: Test
        run: dotnet test --no-restore src/StateSmith.sln

      # Test Algorithm.Balanced1
      # Above `Test` step only tests default algorithm (Balanced2)
      # https://github.com/StateSmith/StateSmith/issues/526
      - name: Test Algorithm.Balanced1
        env:
          STATESMITH_TEST_ALGORITHM_ID: Balanced1

        # only the early supported languages support Balanced1 so we just test them to avoid expected unsupported failures for later languages.
        run: dotnet test src/StateSmithTest/ --filter 'DisplayName~Spec.Spec2.C.|DisplayName~Spec.Spec2.CSharp.|DisplayName~Spec.Spec2.JavaScript.'
